<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="docTitle">حكايتنا | هديتك الخاصة</title>
    
    <!-- خطوط عربية عصرية -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800;900&family=Readex+Pro:wght@300;500;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Leaflet CSS للخريطة التفاعلية -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <script>
        if ('scrollRestoration' in history) {
            history.scrollRestoration = 'manual';
        }
        window.scrollTo(0, 0);
    </script>

    <style>
        :root {
            --bg-dark: #09090b; 
            --accent-glow: #e11d48; 
            --surface: #18181b;
        }

        body {
            font-family: 'Readex Pro', sans-serif;
            background-color: var(--bg-dark);
            color: #f4f4f5;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            /* منع تحديد النص لزيادة الحماية */
            -webkit-user-select: none; 
            -moz-user-select: none; 
            -ms-user-select: none; 
            user-select: none; 
        }

        .no-scroll { height: 100dvh; overflow: hidden !important; }
        h1, h2, h3, .title-font { font-family: 'Cairo', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }

        .glass {
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }

        .fade-up {
            opacity: 0;
            transform: translateY(40px) scale(0.95);
            transition: opacity 0.8s ease-out, transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .fade-up.visible { opacity: 1; transform: translateY(0) scale(1); }

        .glow-bg {
            position: absolute; width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(225,29,72,0.15) 0%, rgba(9,9,11,0) 70%);
            border-radius: 50%; pointer-events: none; z-index: -1;
            animation: pulse-glow 8s infinite alternate;
        }
        @keyframes pulse-glow {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.2); opacity: 1; }
        }

        /* الجاليري */
        .horizontal-scroll {
            display: flex; overflow-x: auto; scroll-snap-type: x mandatory;
            gap: 2rem; padding-bottom: 2rem; scroll-behavior: smooth;
        }
        .horizontal-scroll::-webkit-scrollbar { display: none; }
        .snap-card {
            scroll-snap-align: center; width: 85vw; height: 85vw; 
            max-width: 450px; max-height: 450px;
            transform-style: preserve-3d; transition: transform 0.3s ease;
        }

        /* التايم لاين */
        .timeline-container { position: relative; padding-right: 40px; }
        .timeline-line {
            position: absolute; right: 0; top: 0; bottom: 0; width: 4px;
            background: linear-gradient(to bottom, transparent, #e11d48, transparent); border-radius: 4px;
        }
        .timeline-node {
            position: absolute; right: -12px; width: 28px; height: 28px;
            background: var(--bg-dark); border: 6px solid #e11d48;
            border-radius: 50%; box-shadow: 0 0 20px rgba(225,29,72,0.8); z-index: 2;
        }

        /* الجواب */
        .envelope-wrapper {
            position: relative; width: 280px; height: 200px; margin: 0 auto;
            cursor: pointer; perspective: 1500px; transform-style: preserve-3d;
            transition: transform 0.4s ease;
        }
        @media (min-width: 768px) { .envelope-scale-wrapper { transform: scale(1.2); margin-top: 60px; } }
        .envelope-wrapper:hover { transform: scale(1.03); }
        .envelope-wrapper.open { transform: scale(1.05) translateY(10px); }
        .envelope-back { position: absolute; inset: 0; background: #881337; border-radius: 10px; z-index: 1; box-shadow: 0 25px 50px rgba(0,0,0,0.8); }
        .envelope-front { position: absolute; inset: 0; z-index: 3; pointer-events: none; overflow: hidden; border-radius: 10px; }
        .envelope-front::before {
            content: ''; position: absolute; bottom: 0; left: 0; right: 0;
            border-left: 140px solid transparent; border-right: 140px solid transparent;
            border-bottom: 120px solid #be123c; 
        }
        .envelope-front::after {
            content: ''; position: absolute; top: 0; bottom: 0; left: 0; right: 0;
            border-left: 140px solid #9f1239; border-right: 140px solid #9f1239;
            border-top: 100px solid transparent; border-bottom: 100px solid transparent;
        }
        .flap {
            position: absolute; top: 0; left: 0; right: 0;
            border-left: 140px solid transparent; border-right: 140px solid transparent;
            border-top: 120px solid #e11d48; transform-origin: top;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), z-index 0.1s;
            z-index: 4; filter: drop-shadow(0 8px 15px rgba(0,0,0,0.5));
        }
        .letter {
            position: absolute; top: 20px; bottom: 20px; left: 15px; right: 15px; 
            background: #fff; border-radius: 8px; padding: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), z-index 0.1s 0.3s;
            z-index: 2; display: flex; flex-direction: column; justify-content: space-between;
        }
        .envelope-wrapper.open .flap { transform: rotateX(180deg); z-index: 1; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), z-index 0.1s 0.3s; }
        .envelope-wrapper.open .letter { transform: translateY(-130px); z-index: 5; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1) 0.3s, z-index 0.1s 0.3s; }

        .particles {
            position: absolute; inset: 0; pointer-events: none; z-index: 1;
            background-image: radial-gradient(circle at center, rgba(225,29,72,0.5) 2px, transparent 2px);
            background-size: 60px 60px; opacity: 0.15; animation: drift 25s linear infinite;
        }
        @keyframes drift { 0% { background-position: 0 0; } 100% { background-position: 120px 120px; } }

        /* شاشة القفل (PIN) */
        .pin-dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid #e11d48; transition: all 0.3s ease; }
        .pin-dot.filled { background-color: #e11d48; box-shadow: 0 0 10px #e11d48; }
        .pin-btn {
            width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; font-weight: bold; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s; cursor: pointer;
        }
        .pin-btn:active { background: rgba(225, 29, 72, 0.3); transform: scale(0.95); }
        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-2px, 0, 0); } 20%, 80% { transform: translate3d(4px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-8px, 0, 0); } 40%, 60% { transform: translate3d(8px, 0, 0); } }

        /* سما السما (تم إزالة البوردر) */
        .star-map-circle {
            width: 300px; height: 300px; border-radius: 50%;
            background: radial-gradient(circle at bottom, #1e1b4b 0%, #000000 100%);
            box-shadow: inset 0 0 40px rgba(0,0,0,0.8), 0 0 30px rgba(225,29,72,0.3);
            position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;
        }
        .stars-bg {
            position: absolute; inset: 0;
            background-image: radial-gradient(1px 1px at 20px 30px, #ffffff, rgba(0,0,0,0)), radial-gradient(1px 1px at 40px 70px, #ffffff, rgba(0,0,0,0)), radial-gradient(1.5px 1.5px at 90px 40px, #ffffff, rgba(0,0,0,0)), radial-gradient(2px 2px at 160px 120px, rgba(255,255,255,0.8), rgba(0,0,0,0)), radial-gradient(1px 1px at 220px 80px, #ffffff, rgba(0,0,0,0)), radial-gradient(1px 1px at 260px 180px, #ffffff, rgba(0,0,0,0)), radial-gradient(1.5px 1.5px at 110px 240px, #ffffff, rgba(0,0,0,0));
            animation: rotateStars 150s linear infinite;
        }
        @keyframes rotateStars { 100% { transform: rotate(360deg); } }

        /* Voice Notes */
        .voice-note-player {
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px); border-radius: 30px; padding: 8px 16px;
            display: inline-flex; align-items: center; gap: 12px; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; transition: all 0.3s ease;
        }
        .voice-note-player:hover { border-color: #e11d48; background: rgba(225,29,72,0.1); }
        .waves-container { display: flex; align-items: center; gap: 3px; height: 20px; }
        .wave-bar { width: 3px; background-color: #e11d48; border-radius: 3px; height: 4px; transition: height 0.2s; }
        .voice-note-player.playing .wave-bar { animation: sound-wave 1s ease-in-out infinite alternate; }
        .voice-note-player.playing .wave-bar:nth-child(1) { animation-delay: 0.1s; }
        .voice-note-player.playing .wave-bar:nth-child(2) { animation-delay: 0.3s; }
        .voice-note-player.playing .wave-bar:nth-child(3) { animation-delay: 0.5s; }
        .voice-note-player.playing .wave-bar:nth-child(4) { animation-delay: 0.2s; }
        .voice-note-player.playing .wave-bar:nth-child(5) { animation-delay: 0.4s; }
        @keyframes sound-wave { 0% { height: 4px; } 100% { height: 20px; } }

        /* الخريطة */
        #interactiveMap { width: 100%; height: 450px; border-radius: 2rem; z-index: 10; }
        .leaflet-container { background: #09090b !important; font-family: 'Readex Pro', sans-serif; }
        .custom-map-marker { background: #e11d48; border-radius: 50%; border: 3px solid #fff; box-shadow: 0 0 15px #e11d48; animation: pulse-marker 2s infinite; }
        @keyframes pulse-marker { 0% { box-shadow: 0 0 0 0 rgba(225, 29, 72, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(225, 29, 72, 0); } 100% { box-shadow: 0 0 0 0 rgba(225, 29, 72, 0); } }
        .leaflet-control-attribution { display: none !important; }

        /* كروت 3D */
        .flip-card { background-color: transparent; height: 320px; perspective: 1000px; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.8s cubic-bezier(0.4, 0.2, 0.2, 1); transform-style: preserve-3d; -webkit-transform-style: preserve-3d; cursor: pointer; }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); -webkit-transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: 1.5rem; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 2rem; text-align: center; }
        .flip-card-back { transform: rotateY(180deg); -webkit-transform: rotateY(180deg); background: linear-gradient(135deg, rgba(225,29,72,0.2), rgba(24,24,27,0.9)); border: 1px solid rgba(225,29,72,0.4); }

        /* Modal الجواب */
        #letterFullscreenModal { transition: opacity 0.4s ease, transform 0.4s ease; }
        #letterFullscreenModal.hidden-modal { opacity: 0; pointer-events: none; transform: scale(0.95); }

        /* شاشة جلب البيانات */
        #dataLoader {
            position: fixed; inset: 0; z-index: 20000; background: #09090b;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body class="antialiased no-scroll"> 

    <!-- جاري تحميل البيانات -->
    <div id="dataLoader">
        <div class="w-16 h-16 border-4 border-gray-700 border-t-[#e11d48] rounded-full animate-spin"></div>
        <p class="mt-4 text-gray-400 font-bold">جاري تجهيز الهدية...</p>
    </div>

    <!-- شاشة القفل -->
    <div id="pinScreen" class="fixed inset-0 z-[10001] bg-[#09090b]/90 backdrop-blur-xl flex flex-col items-center justify-center w-full h-[100dvh] transition-opacity duration-700 hidden">
        <div class="mb-8 flex flex-col items-center">
            <div class="w-20 h-20 rounded-full bg-gray-800 border-2 border-gray-600 mb-4 flex items-center justify-center overflow-hidden shadow-lg">
                <i data-lucide="lock" class="w-8 h-8 text-gray-400"></i>
            </div>
            <h2 id="pinTitle" class="text-2xl font-bold text-white title-font"></h2>
            <p id="pinSubtitle" class="text-sm text-gray-400 mt-2 text-center max-w-[250px]"></p>
        </div>
        <div id="pinDots" class="flex gap-4 mb-10">
            <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
        </div>
        <div class="grid grid-cols-3 gap-6" dir="ltr">
            <button class="pin-btn text-white" onclick="enterPin('1')">1</button>
            <button class="pin-btn text-white" onclick="enterPin('2')">2</button>
            <button class="pin-btn text-white" onclick="enterPin('3')">3</button>
            <button class="pin-btn text-white" onclick="enterPin('4')">4</button>
            <button class="pin-btn text-white" onclick="enterPin('5')">5</button>
            <button class="pin-btn text-white" onclick="enterPin('6')">6</button>
            <button class="pin-btn text-white" onclick="enterPin('7')">7</button>
            <button class="pin-btn text-white" onclick="enterPin('8')">8</button>
            <button class="pin-btn text-white" onclick="enterPin('9')">9</button>
            <div></div>
            <button class="pin-btn text-white" onclick="enterPin('0')">0</button>
            <button class="pin-btn text-gray-400 !bg-transparent !border-transparent hover:text-white" onclick="deletePin()">
                <i data-lucide="delete" class="w-8 h-8"></i>
            </button>
        </div>
    </div>

    <!-- شاشة التحميل -->
    <div id="loader" class="fixed inset-0 z-[10000] bg-[#09090b] flex flex-col items-center justify-center w-full h-[100dvh] transition-opacity duration-700 hidden">
        <div class="relative w-32 h-32 flex items-center justify-center">
            <div class="absolute inset-0 rounded-full border-t-4 border-l-4 border-[#e11d48] animate-spin"></div>
            <i data-lucide="heart" class="w-12 h-12 text-[#e11d48] animate-pulse fill-current"></i>
        </div>
        <h2 id="loaderText" class="mt-8 text-2xl font-bold text-white title-font tracking-wide"></h2>
        <button id="startBtn" class="mt-10 px-12 py-4 text-xl bg-[#e11d48] text-white rounded-full font-bold shadow-[0_0_30px_rgba(225,29,72,0.6)] hover:scale-110 active:scale-95 hidden opacity-0 transition-all duration-500 z-50"></button>
    </div>

    <!-- مشغل المزيكا -->
    <div id="musicWidget" class="fixed bottom-8 right-6 md:right-10 md:bottom-12 z-[90] glass rounded-full p-2.5 flex items-center gap-4 shadow-2xl border border-gray-700/80 backdrop-blur-xl hidden">
        <div class="relative w-12 h-12 rounded-full bg-gray-900 border-2 border-gray-600 flex items-center justify-center spin-slow spin-paused pointer-events-none" id="musicDisk">
            <div class="w-4 h-4 rounded-full bg-gray-900 border-2 border-gray-600 z-10 pointer-events-none"></div>
            <i data-lucide="music" class="w-5 h-5 text-[#e11d48] absolute pointer-events-none"></i>
        </div>
        <div class="flex items-center gap-3 pl-3 border-r border-gray-600 pr-3">
            <button id="playPauseBtn" class="text-white hover:text-[#e11d48] transition-colors p-2 relative w-8 h-8 flex justify-center items-center cursor-pointer">
                <div id="iconPlay" class="absolute"><i data-lucide="play" class="w-7 h-7 fill-current"></i></div>
                <div id="iconPause" class="absolute hidden"><i data-lucide="pause" class="w-7 h-7 fill-current"></i></div>
            </button>
            <button id="muteBtn" class="text-[#e11d48] hover:text-white transition-colors p-2 relative w-8 h-8 flex justify-center items-center cursor-pointer">
                <div id="iconUnmute" class="absolute"><i data-lucide="volume-2" class="w-7 h-7"></i></div>
                <div id="iconMute" class="absolute hidden"><i data-lucide="volume-x" class="w-7 h-7"></i></div>
            </button>
        </div>
        <audio id="bgMusic" loop></audio>
    </div>

    <!-- 1. الهيرو -->
    <header class="relative min-h-[100dvh] flex flex-col justify-center items-center text-center px-6 overflow-hidden">
        <div class="particles"></div>
        <div class="absolute inset-0 z-0">
            <img src="hero-bg.webp" class="w-full h-full object-cover opacity-20 mix-blend-luminosity" onerror="this.style.display='none'">
            <div class="absolute inset-0 bg-gradient-to-b from-[#09090b]/40 via-[#09090b]/80 to-[#09090b]"></div>
        </div>
        <div class="glow-bg top-[-10%] right-[-10%] w-[600px] h-[600px]"></div>
        <div class="glow-bg bottom-[-10%] left-[-10%] w-[600px] h-[600px]"></div>
        
        <div class="z-10 fade-up">
            <span id="heroBadge" class="inline-block py-2 px-6 rounded-full border border-[#e11d48]/40 bg-[#e11d48]/10 text-[#e11d48] text-lg font-bold mb-8 backdrop-blur-md shadow-[0_0_20px_rgba(225,29,72,0.3)]"></span>
            <h1 id="heroNames" class="text-7xl md:text-9xl font-extrabold text-white mb-6 title-font tracking-tight drop-shadow-[0_10px_20px_rgba(0,0,0,0.8)]"></h1>
            <p id="heroDesc" class="text-2xl md:text-3xl text-gray-300 mt-6 max-w-2xl mx-auto leading-relaxed"></p>
        </div>

        <div class="absolute bottom-16 flex flex-col items-center gap-3 text-gray-400 animate-bounce z-10">
            <span id="scrollHint" class="text-lg font-bold tracking-widest"></span>
            <i data-lucide="chevron-down" class="w-8 h-8 text-[#e11d48]"></i>
        </div>
    </header>

    <!-- 2. التايم لاين -->
    <section class="py-32 px-6 relative">
        <div class="max-w-4xl mx-auto">
            <h2 id="timelineMainTitle" class="text-5xl font-bold text-center text-white mb-24 title-font drop-shadow-2xl"></h2>
            <div class="timeline-container" id="timelineContainer">
                <div class="timeline-line"></div>
                <!-- سيتم حقن المحتوى ديناميكياً هنا -->
            </div>
        </div>
    </section>

    <!-- 3. سما السما -->
    <section class="py-24 px-6 relative overflow-hidden fade-up">
        <div class="max-w-5xl mx-auto flex flex-col md:flex-row items-center justify-between gap-12 bg-[#18181b]/50 rounded-[3rem] p-8 md:p-16 border border-gray-800 shadow-2xl">
            <div class="flex-1 text-center md:text-right">
                <span id="starMapBadge" class="text-[#e11d48] font-bold tracking-wider mb-2 block"></span>
                <h2 id="starMapTitle" class="text-4xl md:text-5xl font-bold text-white mb-6 title-font drop-shadow-2xl"></h2>
                <p id="starMapDesc" class="text-gray-400 text-lg leading-relaxed mb-6"></p>
                <div class="inline-flex items-center gap-2 bg-gray-900 px-4 py-2 rounded-full border border-gray-700 text-sm text-gray-300">
                    <i data-lucide="map-pin" class="w-4 h-4 text-[#e11d48]"></i>
                    <span id="starMapLocation"></span>
                </div>
            </div>
            <div class="flex-1 flex justify-center">
                <div class="star-map-circle">
                    <div class="stars-bg"></div>
                    <div class="absolute inset-0 flex items-center justify-center z-10 pointer-events-none mix-blend-screen opacity-50">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/Constellation_map.svg/1024px-Constellation_map.svg.png" class="w-[180%] h-[180%] max-w-none object-cover object-center opacity-30" alt="">
                    </div>
                    <div class="absolute bottom-6 left-1/2 -translate-x-1/2 text-center z-20 w-full">
                        <p id="starMapDateLabel" class="text-white font-serif text-sm opacity-80 uppercase tracking-widest"></p>
                        <p id="starMapDateValue" class="text-[#e11d48] text-xs mt-1 font-bold"></p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 4. خريطة ذكرياتنا -->
    <section class="py-24 px-6 fade-up relative z-10">
        <div class="max-w-6xl mx-auto">
            <div class="text-center mb-12">
                <h2 id="mapMainTitle" class="text-4xl md:text-5xl font-bold text-white mb-4 title-font"></h2>
                <p id="mapMainDesc" class="text-gray-400 text-lg mb-8"></p>
                <div id="mapButtonsContainer" class="flex flex-wrap justify-center gap-4 mb-8">
                    <!-- سيتم حقن الزراير ديناميكياً هنا -->
                </div>
            </div>
            <div dir="ltr" class="p-2 glass rounded-[2.5rem] shadow-2xl border border-gray-700/50">
                <div id="interactiveMap"></div>
            </div>
        </div>
    </section>

    <!-- 5. معرض الصور -->
    <section class="py-32 overflow-hidden fade-up relative max-w-[1400px] mx-auto">
        <div class="px-6 mb-12 text-right flex justify-between items-end">
            <div>
                <h2 id="galleryMainTitle" class="text-5xl font-bold text-white title-font drop-shadow-2xl"></h2>
                <p class="text-gray-400 text-lg mt-3 block md:hidden">اسحب يمين وشمال عشان تشوف الصور <i data-lucide="arrow-left-right" class="inline w-5 h-5 ml-1"></i></p>
                <p id="galleryHint" class="text-[#e11d48] text-sm mt-1 font-bold"></p>
            </div>
            <div class="hidden md:flex gap-4" dir="ltr">
                <button id="nextBtn" class="w-14 h-14 rounded-full glass border border-gray-600 flex items-center justify-center hover:bg-[#e11d48] hover:border-[#e11d48] hover:scale-110 transition-all text-white shadow-[0_0_20px_rgba(0,0,0,0.5)]">
                    <i data-lucide="chevron-left" class="w-8 h-8 pointer-events-none"></i>
                </button>
                <button id="prevBtn" class="w-14 h-14 rounded-full glass border border-gray-600 flex items-center justify-center hover:bg-[#e11d48] hover:border-[#e11d48] hover:scale-110 transition-all text-white shadow-[0_0_20px_rgba(0,0,0,0.5)]">
                    <i data-lucide="chevron-right" class="w-8 h-8 pointer-events-none"></i>
                </button>
            </div>
        </div>
        <div class="relative px-6">
            <div class="horizontal-scroll" id="galleryContainer">
                <!-- سيتم حقن الصور ديناميكياً هنا -->
            </div>
        </div>
    </section>

    <!-- 6. رسايل الأسبوع -->
